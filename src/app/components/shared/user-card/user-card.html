@if (user) {
<div class="card-base user-card">

  @if (user.image) {
  <img
    [src]="user.image"
    class="user-avatar"
    alt="avatar"/>
  } @else {
  <div class="user-avatar-placeholder"></div>
  }

  <h3 class="user-name">
    {{ user.name }} {{ user.surname }}
  </h3>

  <p class="user-nick">
    @{{ user.nick }}
  </p>

  @if (showEmail) {
  <p class="user-email">
    {{ user.email }}
  </p>
  }

  @if (showStats && stats) {
  <div class="user-stats">
    <div>
      <strong>{{ stats.following }}</strong>
      <span>Siguiendo</span>
    </div>

    <div>
      <strong>{{ stats.followed }}</strong>
      <span>Seguidores</span>
    </div>
  </div>
  }

  @if (buttonText && buttonLink) {
  <button class="btn btn-outline user-button" [routerLink]="buttonLink">
    {{ buttonText }}
  </button>
  }

</div>
}
