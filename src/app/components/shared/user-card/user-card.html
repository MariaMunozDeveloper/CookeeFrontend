@if (user) {
  <div class="card-base user-card">

    <div class="user-card-avatar-wrap">
      @if (user.image) {
        <img [src]="user.image" class="user-avatar" alt="avatar"/>
      } @else {
        <div class="user-avatar-placeholder"></div>
      }
    </div>

    <div class="user-card-body">
      <h3 class="user-name">{{ user.name }} {{ user.surname }}</h3>
      <p class="user-nick">@{{ user.nick }}</p>

      @if (showEmail) {
        <p class="user-email">{{ user.email }}</p>
      }

      @if (showStats && stats) {
        <div class="user-stats">
          <div class="user-stat-item">
            <strong>{{ stats.following ?? 0 }}</strong>
            <span>Siguiendo</span>
          </div>
          <div class="user-stat-divider"></div>
          <div class="user-stat-item">
            <strong>{{ stats.followed ?? 0 }}</strong>
            <span>Seguidores</span>
          </div>
        </div>
      }
    </div>

    @if (buttonText && buttonLink) {
      <button class="btn btn-outline user-button" [routerLink]="buttonLink">
        {{ buttonText }}
      </button>
    }

  </div>
}
