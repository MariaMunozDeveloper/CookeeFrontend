<nav class="navbar">
  <div class="page-container navbar-content">
    <div class="navbar-brand">
      <a class="navbar-logo" routerLink="/">Cookee</a>
    </div>

    <div class="navbar-menu">
      <a class="navbar-link" routerLink="/feed">Feed</a>
      <a class="navbar-link" routerLink="/recipes">Recipes</a>
      <a class="navbar-link navbar-link-messages" routerLink="/messages">
        Messages
        @if (unreadMessages > 0) {
        <span class="navbar-badge">{{ unreadMessages }}</span>
        }
      </a>
      <a class="navbar-link" routerLink="/people">Cocinillas</a>
    </div>

    <div class="navbar-actions">
      @if (!identity) {
      <button class="btn btn-outline" routerLink="/login">Log in</button>
      <button class="btn btn-primary" routerLink="/register">Sign up</button>
      }

      @if (identity) {
      <div class="navbar-user-menu">
        <button class="btn btn-outline navbar-user-button" (click)="toggleUserMenu()">
          @if (identity.image) {
          <img
            [src]="'http://localhost:3000/uploads/avatars/' + identity.image"
            alt="Avatar"
            class="navbar-avatar"
          />
          } @else {
          <div class="navbar-avatar-placeholder"></div>
          }

          <span class="navbar-user-nick">{{ identity.nick }}</span>
        </button>

        @if (showUserMenu) {
        <div class="navbar-dropdown">
          <a class="navbar-dropdown-link" [routerLink]="['/profile', identity._id]" (click)="closeUserMenu()">
            Mi perfil
          </a>

          <a class="navbar-dropdown-link" routerLink="/my-data" (click)="closeUserMenu()">
            Mis datos
          </a>

          <button class="navbar-dropdown-link navbar-dropdown-button" (click)="logout()">
            Cerrar sesión
          </button>
        </div>
        }
      </div>
      }
    </div>
  </div>
</nav>
